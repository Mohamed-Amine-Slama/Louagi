services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://:louagi-dev@redis:6379
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/graphql',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({operationName:'Health',query:'query Health { Health }'})}).then(r=>r.json()).then(j=>process.exit(j&&j.data&&j.data.Health&&j.data.Health.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
    env_file:
      - ./.env
    environment:
      CI: "0"
      EXPO_NO_TELEMETRY: "1"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${EXPO_HOST_IP:-localhost}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npx expo start
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    stdin_open: true
    tty: true

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass louagi-dev

volumes:
  api_node_modules:
  app_node_modules:
