services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 3000
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
    env_file:
      - ./.env
    environment:
      CI: "0"
      EXPO_NO_TELEMETRY: "1"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${EXPO_HOST_IP:-localhost}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npx expo start
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
      - "19006:19006"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    stdin_open: true
    tty: true

volumes:
  api_node_modules:
  app_node_modules:
